name: TalkingDB Repo Orchestrator

on:
  workflow_dispatch:
    inputs:
      host:
        required: false
        type: string
        default: ""

      repos_json:
        required: false
        type: string
        default: ""

      docker_module_ttt:
        required: false
        type: string
        default: "true"

      docker_elementizer:
        required: false
        type: string
        default: "false"

      module_ttt_tag:
        required: false
        type: string
        default: ""

      elementizer_tag:
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml tomli tomli-w

      - name: Run orchestrator
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          HOST: ${{ inputs.host }}
          REPOS_JSON: ${{ inputs.repos_json }}
          DOCKER_MODULE_TTT: ${{ inputs.docker_module_ttt }}
          DOCKER_ELEMENTIZER: ${{ inputs.docker_elementizer }}
          MODULE_TTT_TAG: ${{ inputs.module_ttt_tag }}
          ELEMENTIZER_TAG: ${{ inputs.elementizer_tag }}
        run: python scripts/orchestrator.py